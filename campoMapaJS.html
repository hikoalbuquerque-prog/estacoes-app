    elChkAtivo = document.getElementById('chkAtivo');
    elChkSolicitado = document.getElementById('chkSolicitado');
    elChkCancelado = document.getElementById('chkCancelado');

    elChkRaio = document.getElementById('chkRaio');
    elRaioInput = document.getElementById('raioInput');

    elChkDuplicidades = document.getElementById('chkDuplicidades');
    elChkJetCross = document.getElementById('chkJetCross');

    elDashTotal = document.getElementById('dashTotal');
    elDashPublica = document.getElementById('dashPublica');
    elDashPrivada = document.getElementById('dashPrivada');
    elDashConcorrente = document.getElementById('dashConcorrente');
    elDashRender = document.getElementById('dashRender');

    elDashboardSP = document.getElementById('dashboardSP');
    elDashboardDup = document.getElementById('dashboardDup');

    elLegendaJetCross = document.getElementById('legendaJetCross');

    elChkPoligonos = document.getElementById('chkPoligonos');
    elGrupoPoly = document.getElementById('grupoPoligonoFilter');
    elChipGrupo = document.getElementById('chipGrupo');
    elChipFases = document.getElementById('chipFases');
    elChipSomenteAtivos = document.getElementById('chipSomenteAtivos');
    elChkPolySomenteAtivos = document.getElementById('chkPoligonoSomenteAtivos');

    hudTotal = document.getElementById('hudTotal');
    hudRender = document.getElementById('hudRender');
    hudPub = document.getElementById('hudPub');
    hudPri = document.getElementById('hudPri');
    hudCon = document.getElementById('hudCon');
    hudRaio = document.getElementById('hudRaio');
    hudRaioVal = document.getElementById('hudRaioVal');

    elSearchInput = document.getElementById('searchInput');
    if (elSearchInput) {
      elSearchInput.addEventListener('input', () => {
        clearTimeout(searchTimer_);
        searchTimer_ = setTimeout(() => {
          SEARCH_Q = (elSearchInput.value || '').toString().trim().toLowerCase();
          dispatch_('FILTER_CHANGED');
        }, 90);
      });
    }

    if (btnMinhaLocal) {
      btnMinhaLocal.addEventListener('click', () => { centerToMyLocationOnce_(); startGeoWatch_(); });
    }

    if (btnSeguirLocal) {
      btnSeguirLocal.addEventListener('click', () => {
        geoFollow = !geoFollow;
        if (lblSeguirLocal) lblSeguirLocal.textContent = geoFollow ? 'ON' : 'OFF';
        btnSeguirLocal.classList.toggle('on', geoFollow);
        if (geoFollow) startGeoWatch_();
      });
    }

    const btnBikeLayer = document.getElementById('btnBikeLayer');
    const lblBikeLayer = document.getElementById('lblBikeLayer');

    function setBikeLayer_(on){
      bikeLayerOn = !!on;
      if (!bikeLayer) bikeLayer = new google.maps.BicyclingLayer();
      bikeLayer.setMap(bikeLayerOn ? map : null);
      if (lblBikeLayer) lblBikeLayer.textContent = bikeLayerOn ? 'ON' : 'OFF';
      if (btnBikeLayer) btnBikeLayer.classList.toggle('on', bikeLayerOn);
    }

    if (btnBikeLayer){
      btnBikeLayer.addEventListener('click', () => {
        if (!map || !google?.maps?.BicyclingLayer) return;
        setBikeLayer_(!bikeLayerOn);
      });
    }

    const btnRaioCentro = document.getElementById('btnRaioCentro');
    const lblRaioEst = document.getElementById('lblRaioEst');

    if (btnRaioCentro) btnRaioCentro.addEventListener('click', () => {
      if (!MAP_STATE) return;
      if (IS_MOBILE) return;
      if (MAP_STATE.layer !== LAYER.NORMAL) return;
      dispatch_('TOGGLE_STATION_RADIUS');
      if (lblRaioEst) lblRaioEst.textContent = (MAP_STATE?.stationRadius ? 'ON' : 'OFF');
    });

    if (btnCollapse && sidebarEl && !IS_MOBILE) {
      btnCollapse.addEventListener('click', () => {
        const col = sidebarEl.classList.toggle('collapsed');
        btnCollapse.textContent = col ? '⟩⟩' : '⟨⟨';
        triggerMapResizeDebounced_();
      });
    }

    if (btnPoligonos) btnPoligonos.addEventListener('click', () => {
      if (!MAP_STATE) return;
      if (!MAP_STATE.canPolygons && !MAP_STATE.polygons) return;
      dispatch_('TOGGLE_POLYGONS');
    });

    if (btnRaio) btnRaio.addEventListener('click', () => {
      if (!MAP_STATE) return;
      if (MAP_STATE.layer !== LAYER.NORMAL) return;
      dispatch_('TOGGLE_RADIUS');
    });

    if (btnCluster) btnCluster.addEventListener('click', () => {
      if (!MAP_STATE) return;
      dispatch_('TOGGLE_CLUSTER');
    });

    if (btnCentralizar) btnCentralizar.addEventListener('click', () => {
      if (!map) return;
      if (elCidade?.value && estacoesPorCidade[elCidade.value]?.length) {
        fitBoundsCidade(estacoesPorCidade[elCidade.value]);
      } else {
        map.setCenter({ lat: -14.235, lng: -51.925 });
        map.setZoom(5);
      }
      safeRenderRequest_(true);
    });

    if (btnRecarregar) btnRecarregar.addEventListener('click', () => {
      hardResetLayers_();
      google.script.run
        .withSuccessHandler(onData)
        .withFailureHandler(err => console.error('getEstacoesWebApp erro:', err))
        .getEstacoesWebApp();
    });

    [
      elChkPublica, elChkPrivada, elChkConcorrente,
      elChkPatinete, elChkBike, elChkHibrida,
      elChkAtivo, elChkSolicitado, elChkCancelado
    ].filter(Boolean).forEach(el => el.addEventListener('change', () => dispatch_('FILTER_CHANGED')));

    elCidade?.addEventListener('change', async function() {
      limparViewportCircle();
      entrouPorCidade = false;

      atualizarUIGruposPoligonos_(elCidade.value);

      if (elCidade.value) {
        // Mobile lazy: load stations for selected city if backend supports it
        if (IS_MOBILE && MOBILE_CFG.cityLazyLoad) {
          const ok = await ensureCityLoadedMobile_(elCidade.value);
          if (ok && Array.isArray(estacoes) && estacoes.length) {
            entrouPorCidade = true;
            try { fitBoundsCidade(estacoes); } catch(e){}
          }
        } else {
          const lista = estacoesPorCidade[elCidade.value];
          if (lista && lista.length) {
            entrouPorCidade = true;
            fitBoundsCidade(lista);
          }
        }
      }

      limparJetCross();

      jetCrossFitAplicado = false;
      if (elLegendaJetCross) elLegendaJetCross.style.display = 'none';

      dispatch_('CITY_CHANGED', { city: elCidade.value || '' });
    });

    elSubpref?.addEventListener('change', () => dispatch_('FILTER_CHANGED'));

    elRaioInput?.addEventListener('change', function() {
      let v = Number(this.value) || 200;
      if (MAP_STATE?.radius) v = Math.max(RAIO_ANALISE_MIN, Math.min(RAIO_ANALISE_MAX, v));
      else v = Math.max(RAIO_ESTACAO_MIN, Math.min(RAIO_ESTACAO_MAX, v));
      this.value = v;
      dispatch_('FILTER_CHANGED');
    });

    elChkJetCross?.addEventListener('change', function() {
      if (this.checked) {
        hardResetLayers_();
        jetCrossFitAplicado = false;
        dispatch_('TOGGLE_LAYER', { layer: LAYER.JETCROSS });
      } else {
        hardResetLayers_();
        limparJetCross();
        jetCrossFitAplicado = false;
        dispatch_('TOGGLE_LAYER', { layer: LAYER.NORMAL });
      }
    });

    elChkDuplicidades?.addEventListener('change', function() {
      hardResetLayers_();
      dispatch_('TOGGLE_LAYER', { layer: this.checked ? LAYER.DUP : LAYER.NORMAL });
    });

    elChkPoligonos?.addEventListener('change', () => dispatch_('TOGGLE_POLYGONS'));
    elGrupoPoly?.addEventListener('change', () => dispatch_('FILTER_CHANGED'));
    elChkPolySomenteAtivos?.addEventListener('change', () => dispatch_('FILTER_CHANGED'));
    [...document.querySelectorAll('.chkFase')].filter(Boolean)
      .forEach(ch => ch.addEventListener('change', () => dispatch_('FILTER_CHANGED')));

    try { if (!MAP_STATE) initFSM_(); } catch(e) { console.error('initFSM fail', e); }
    try { setupBottomSheetMobile_(); } catch(e) { console.error('sheet fail', e); }

    // se já tiver data carregada, força render seguro
    safeRenderRequest_(true);
  });

  window.initMap = initMap;
  
</script>
